name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  lint:
    name: ruff (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff==0.15.21
      - run: ruff check src tests

  typecheck:
    name: mypy (advisory)
    runs-on: ubuntu-latest
    # Advisory: the codebase is partially typed. Reports issues without
    # blocking merges until type coverage improves.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install mypy
      - run: mypy src/gasbench --ignore-missing-imports
