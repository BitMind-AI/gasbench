# Video Human Datasets — Public gasbench config for the "human" vertical
# Built from existing public datasets in video_datasets.yaml.
# Names are explicitly non-overlapping with current v15 video-human holdouts.

benchmark_size: 25000
datasets:
- name: rtfs-10k-real
  path: kontur-ai/rtfs-10k
  modality: video
  media_type: real
  source_format: mp4
  media_per_archive: 500
  archives_per_dataset: 2
  include_paths:
  - original_videos
  notes: RTFS-10K real video-conference clips (Creative Commons)
- name: dfd-real
  path: Hemgg/deep-fake-detection-dfd-entire-original-datasett
  modality: video
  media_type: real
  source_format: mp4
  media_per_archive: -1
  archives_per_dataset: -1
  include_paths:
  - DFD_original sequences
- name: fmfcc-v-real
  path: 34data/fmfcc-v-real
  modality: video
  media_type: real
  source_format: zip
  media_per_archive: 500
  archives_per_dataset: 2
  notes: "FMFCC-V deepfake video benchmark \u2014 original real videos"
- name: polyglotfake-real
  path: 34data/polyglotfake-real
  modality: video
  media_type: real
  source_format: zip
  media_per_archive: 500
  archives_per_dataset: 2
  notes: "PolyGlotFake multilingual deepfake benchmark \u2014 real source videos"
- name: rareact
  path: 34data/rareact
  modality: video
  media_type: real
  source_format: zip
  media_per_archive: 500
  archives_per_dataset: 2
