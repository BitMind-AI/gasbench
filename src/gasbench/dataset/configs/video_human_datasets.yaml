# Video Human Datasets — Public gasbench config for the "human" vertical
# Curated for talking-head / face-centric content only.

benchmark_size: 25000
datasets:
- name: blendface
  path: 34data/blendface
  modality: video
  media_type: semisynthetic
  source_format: zip
  media_per_archive: 500
  archives_per_dataset: 2
  notes: BlendFace face-swap deepfake videos
- name: dfd-fake
  path: Hemgg/deep-fake-detection-dfd-entire-original-datasett
  modality: video
  media_type: semisynthetic
  source_format: mp4
  media_per_archive: -1
  archives_per_dataset: -1
  include_paths:
  - DFD_manipulated_sequences
- name: dfd-real
  path: Hemgg/deep-fake-detection-dfd-entire-original-datasett
  modality: video
  media_type: real
  source_format: mp4
  media_per_archive: -1
  archives_per_dataset: -1
  include_paths:
  - DFD_original sequences
